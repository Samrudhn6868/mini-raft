# Mini-RAFT Mono-Cluster: One Container, Full RAFT Cluster
services:
  gateway:
    build: .
    environment:
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    restart: always

# No more node1, node2, node3 services. 
# The gateway container spawns them internally on localhost.

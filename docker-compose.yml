# Mini-RAFT distributed stack: 3 replicas + gateway + frontend

services:
  node1:
    build:
      context: .
      dockerfile: Dockerfile
    command: node replica.js 5001
    environment:
      REPLICA_PEERS: http://node1:5001,http://node2:5002,http://node3:5003
    ports:
      - "5001:5001"
    networks:
      - mini-raft-net

  node2:
    build:
      context: .
      dockerfile: Dockerfile
    command: node replica.js 5002
    environment:
      REPLICA_PEERS: http://node1:5001,http://node2:5002,http://node3:5003
    ports:
      - "5002:5002"
    networks:
      - mini-raft-net

  node3:
    build:
      context: .
      dockerfile: Dockerfile
    command: node replica.js 5003
    environment:
      REPLICA_PEERS: http://node1:5001,http://node2:5002,http://node3:5003
    ports:
      - "5003:5003"
    networks:
      - mini-raft-net

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    command: node gateway.js
    environment:
      REPLICA_URLS: http://node1:5001,http://node2:5002,http://node3:5003
    ports:
      - "4000:4000"
    depends_on:
      - node1
      - node2
      - node3
    networks:
      - mini-raft-net

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./style.css:/usr/share/nginx/html/style.css:ro
      - ./app.js:/usr/share/nginx/html/app.js:ro
      - ./auth.js:/usr/share/nginx/html/auth.js:ro
      - ./rtc.js:/usr/share/nginx/html/rtc.js:ro
      - ./ai.js:/usr/share/nginx/html/ai.js:ro
      - ./script.js:/usr/share/nginx/html/script.js:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gateway
    networks:
      - mini-raft-net

networks:
  mini-raft-net:
    driver: bridge

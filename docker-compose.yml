# Mini-RAFT distributed stack: 3 replicas + gateway + frontend

services:
  node1:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "npm install --omit=dev --no-audit --no-fund && nodemon --legacy-watch --signal SIGTERM replica.js"
    working_dir: /app
    environment:
      REPLICA_ID: node1
      PORT: 5001
      PEERS: http://node1:5001,http://node2:5002,http://node3:5003
    volumes:
      - ./replica1:/app
      - ./replica.js:/app/replica.js
      - ./package.json:/app/package.json:ro
      - ./package-lock.json:/app/package-lock.json:ro
      - /app/node_modules
    ports:
      - "5001:5001"
    networks:
      - mini-raft-net

  node2:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "npm install --omit=dev --no-audit --no-fund && nodemon --legacy-watch --signal SIGTERM replica.js"
    working_dir: /app
    environment:
      REPLICA_ID: node2
      PORT: 5002
      PEERS: http://node1:5001,http://node2:5002,http://node3:5003
    volumes:
      - ./replica2:/app
      - ./replica.js:/app/replica.js
      - ./package.json:/app/package.json:ro
      - ./package-lock.json:/app/package-lock.json:ro
      - /app/node_modules
    ports:
      - "5002:5002"
    networks:
      - mini-raft-net

  node3:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "npm install --omit=dev --no-audit --no-fund && nodemon --legacy-watch --signal SIGTERM replica.js"
    working_dir: /app
    environment:
      REPLICA_ID: node3
      PORT: 5003
      PEERS: http://node1:5001,http://node2:5002,http://node3:5003
    volumes:
      - ./replica3:/app
      - ./replica.js:/app/replica.js
      - ./package.json:/app/package.json:ro
      - ./package-lock.json:/app/package-lock.json:ro
      - /app/node_modules
    ports:
      - "5003:5003"
    networks:
      - mini-raft-net

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "npm install --omit=dev --no-audit --no-fund && nodemon --legacy-watch --signal SIGTERM gateway.js"
    working_dir: /app
    environment:
      PORT: 3000
      REPLICA_URLS: http://node1:5001,http://node2:5002,http://node3:5003
    volumes:
      - ./gateway:/app
      - ./gateway.js:/app/gateway.js
      - ./frontend:/app/frontend
      - ./package.json:/app/package.json:ro
      - ./package-lock.json:/app/package-lock.json:ro
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - node1
      - node2
      - node3
    networks:
      - mini-raft-net

  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/style.css:/usr/share/nginx/html/style.css:ro
      - ./frontend/app.js:/usr/share/nginx/html/app.js:ro
      - ./frontend/auth.js:/usr/share/nginx/html/auth.js:ro
      - ./frontend/rtc.js:/usr/share/nginx/html/rtc.js:ro
      - ./frontend/ai.js:/usr/share/nginx/html/ai.js:ro
      - ./frontend/script.js:/usr/share/nginx/html/script.js:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gateway
    networks:
      - mini-raft-net

networks:
  mini-raft-net:
    driver: bridge
